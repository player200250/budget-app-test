<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f7f6f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="我的帳本">
<link rel="manifest" href="manifest.json">
<title>我的帳本</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1a18;--text2:#6b6b65;--text3:#9a9a92;
  --green:#1a7a55;--green-bg:#e8f5ee;
  --red:#c0392b;--red-bg:#fdf0ee;
  --blue:#1a5fa8;--blue-bg:#eaf1fb;
  --amber:#a06b00;--amber-bg:#fdf5e0;
  --purple:#5b3fa8;--purple-bg:#f0edfc;
  --r:16px;--rs:10px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
#root{max-width:600px;margin:0 auto;padding-bottom:90px;overflow-x:hidden}
button,input,select{font-family:'DM Sans',sans-serif;font-size:15px}
input,select{padding:12px 14px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none;width:100%}
input::placeholder{color:var(--text3)}
.sync-bar{font-size:12px;padding:6px 1rem;text-align:center;display:none}
.sync-bar.show{display:block}
.sync-bar.info{background:var(--blue-bg);color:var(--blue)}
.sync-bar.err{background:#fdf0ee;color:var(--red)}
.sync-bar.ok{background:var(--green-bg);color:var(--green)}
</style>
</head>
<body>
<div class="sync-bar" id="sync-bar"></div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback} = React;

const SUPABASE_URL = 'https://umvewlzzwoouuhslaivt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_h6kSR9NpWQggK_5wL_dnyA_DV1-KjNy';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CATS={
  exp:['餐飲','交通','購物','娛樂','醫療','居住','教育','訂閱','其他'],
  inc:['薪水','獎金','投資','副業','退款','其他'],

const CB={'餐飲':'#e8f5ee','交通':'#eaf1fb','購物':'#fdf0ee','娛樂':'#f8edfb','醫療':'#f0edfc','居住':'#fdf5e0','教育':'#edf7ee','訂閱':'#e3f2fd','其他':'#f0efe9','薪水':'#e8f5ee','獎金':'#eaf1fb','投資':'#f0edfc','副業':'#fdf5e0','退款':'#edf7ee','轉帳':'#eaf1fb'};
const ACCT_ICONS={'現金':'💵','銀行存款':'🏦','信用卡':'💳','電子支付':'📱','投資':'📈'};
const ALL_TABS=[
  {id:'home',icon:'⊙',label:'總覽'},
  {id:'add',icon:'+',label:'新增記錄'},
  {id:'records',icon:'≡',label:'明細'},
  {id:'budget',icon:'◎',label:'預算'},
  {id:'accounts',icon:'▣',label:'帳戶'},
  {id:'fixed',icon:'↻',label:'固定收支'},
  {id:'share',icon:'⇌',label:'共享帳本'},
  {id:'ai',icon:'✦',label:'AI 分析'},
];
const MOBILE_NAV=[{id:'home',icon:'⊙',label:'總覽'},{id:'add',icon:'+',label:'新增'},{id:'records',icon:'≡',label:'明細'},{id:'more',icon:'···',label:'更多'}];
const MORE_TABS=ALL_TABS.slice(3);

function showSync(msg,type='info'){
  const el=document.getElementById('sync-bar');
  el.textContent=msg;el.className='sync-bar show '+type;
  if(type!=='info')setTimeout(()=>el.classList.remove('show'),2500);
}

function fmt(n){return Math.round(n).toLocaleString();}
function today(){return new Date().toISOString().slice(0,10);}
function ym(d){return d.toISOString().slice(0,7);}
const isDesktop=()=>window.innerWidth>=600;

const Card=({children,style={}})=>(
  <div style={{background:'var(--surface)',borderRadius:'var(--r)',border:'1px solid var(--border)',padding:'1rem',marginBottom:10,...style}}>{children}</div>
);
const Badge=({cat})=>(
  <span style={{background:CB[cat]||'#f0efe9',color:CC[cat]||'#6b6b65',fontSize:12,padding:'3px 9px',borderRadius:20,fontWeight:500}}>{cat}</span>
);
const SLabel=({children,style={}})=>(
  <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8,...style}}>{children}</div>
);
const ProgBar=({pct,color='var(--green)'})=>(
  <div style={{height:5,background:'var(--surface2)',borderRadius:3,overflow:'hidden'}}>
    <div style={{height:'100%',width:`${Math.min(pct,100)}%`,background:color,borderRadius:3,transition:'width .4s'}}/>
  </div>
);
const Btn=({children,onClick,style={}})=>(
  <button onClick={onClick} style={{padding:'12px 16px',borderRadius:'var(--r)',border:'none',background:'var(--text)',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',width:'100%',...style}}>{children}</button>
);

  const [loading,setLoading]=useState(false);
  async function signInWithGoogle(){
    setLoading(true);
    const {error}=await sb.auth.signInWithOAuth({
      provider:'google',
      options:{redirectTo:window.location.href}

    if(error){showSync('登入失敗：'+error.message,'err');setLoading(false);}
  }
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'2rem',background:'var(--bg)'}}>
      <div style={{width:64,height:64,borderRadius:20,background:'var(--surface)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,marginBottom:'1.5rem',boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}}>💰</div>
      <div style={{fontSize:24,fontWeight:600,letterSpacing:'-0.5px',marginBottom:8}}>我的帳本</div>
      <div style={{fontSize:14,color:'var(--text3)',marginBottom:'2.5rem',textAlign:'center',lineHeight:1.6}}>個人記帳 · 雲端同步 · AI 分析<br/>登入後資料只屬於你</div>
      <button onClick={signInWithGoogle} disabled={loading} style={{
        display:'flex',alignItems:'center',gap:12,padding:'14px 24px',
        borderRadius:'var(--r)',border:'1px solid var(--border2)',
        background:'var(--surface)',cursor:'pointer',fontSize:15,fontWeight:500,
        width:'100%',maxWidth:320,justifyContent:'center',
        opacity:loading?0.6:1
      }}>
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        {loading?'登入中...':'使用 Google 帳號登入'}
      </button>
      <div style={{marginTop:'1.5rem',fontSize:12,color:'var(--text3)',textAlign:'center',lineHeight:1.6}}>
        登入後資料儲存於 Supabase 雲端<br/>電腦與手機自動同步
      </div>
    </div>
  );
}

function HomeView({records,accounts,budgets,viewMonth}){
  const m=ym(viewMonth);
  const mo=records.filter(r=>r.date.startsWith(m));
  const income=mo.filter(r=>r.type==='inc').reduce((s,r)=>s+Number(r.twd),0);
  const expense=mo.filter(r=>r.type==='exp').reduce((s,r)=>s+Number(r.twd),0);
  const bal=income-expense;
  const saveRate=income>0?Math.round((income-expense)/income*100):null;
  const totalAssets=accounts.reduce((s,a)=>{
    let b=Number(a.init)||0;
    records.forEach(r=>{if(r.type==='inc'&&r.acct_id===a.id)b+=Number(r.twd);if(r.type==='exp'&&r.acct_id===a.id)b-=Number(r.twd);if(r.type==='xfr'&&r.acct_id===a.id)b-=Number(r.twd);if(r.type==='xfr'&&r.acct2_id===a.id)b+=Number(r.twd);});
    return s+b;
  },0);
  const days=new Date().getDate();
  const projected=days>0?Math.round(expense/days*30):0;
  const catExp={};mo.filter(r=>r.type==='exp').forEach(r=>{catExp[r.cat]=(catExp[r.cat]||0)+Number(r.twd);});
  const top=Object.entries(catExp).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max=top[0]?top[0][1]:1;
  return(
    <div>
      <Card>
        <div style={{fontSize:11,color:'var(--text3)',fontWeight:500,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:6}}>本月支出</div>
        <div style={{fontSize:40,fontWeight:600,letterSpacing:'-2px',color:'var(--red)',fontFamily:'DM Mono,monospace',lineHeight:1,marginBottom:'1rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${fmt(expense)}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:'1rem'}}>
          {[['收入',`+$${fmt(income)}`,'var(--green)'],['結餘',`${bal>=0?'+':'-'}$${fmt(Math.abs(bal))}`,bal>=0?'var(--green)':'var(--red)'],['總資產',`$${fmt(totalAssets)}`,'var(--text)'],['預估月底',`$${fmt(projected)}`,'var(--amber)']].map(([l,v,c])=>(
            <div key={l} style={{background:'var(--surface2)',borderRadius:10,padding:'10px 12px',minWidth:0}}>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>{l}</div>
              <div style={{fontSize:14,fontWeight:600,color:c,fontFamily:'DM Mono,monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</div>
            </div>
          ))}
        </div>
        <ProgBar pct={saveRate||0} color={saveRate>=20?'var(--green)':saveRate>=10?'var(--amber)':'var(--red)'}/>
        <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>{saveRate!==null?`儲蓄率 ${saveRate}%`:'尚無收入資料'}</div>
      </Card>
      <div style={{display:'grid',gridTemplateColumns:isDesktop()?'1fr 1fr':'1fr',gap:10}}>
        {top.length>0&&<Card><SLabel>支出分類</SLabel>{top.map(([cat,val])=>(
          <div key={cat} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
            <span style={{fontSize:12,color:'var(--text2)',width:44,textAlign:'right',flexShrink:0}}>{cat}</span>
            <div style={{flex:1,height:10,background:'var(--surface2)',borderRadius:5,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${Math.round(val/max*100)}%`,background:CC[cat]||'#6b6b65',borderRadius:5}}/>
            </div>
            <span style={{fontSize:12,fontWeight:500,flexShrink:0,textAlign:'right',color:CC[cat]||'#6b6b65',fontFamily:'DM Mono,monospace',maxWidth:88,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${fmt(val)}</span>
          </div>
        ))}</Card>}
        {mo.slice(0,8).length>0&&<Card style={{padding:'0.75rem'}}><SLabel>最近記錄</SLabel>{mo.slice(0,8).map((r,i)=>{
          const sign=r.type==='inc'?'+':r.type==='xfr'?'⇄':'-';const color=r.type==='inc'?'var(--green)':r.type==='xfr'?'var(--blue)':'var(--red)';
          return(<div key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:i<Math.min(mo.length,8)-1?'1px solid var(--border)':'none'}}>
            <div style={{width:34,height:34,borderRadius:9,background:CB[r.cat]||'#f0efe9',color:CC[r.cat]||'#6b6b65',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:600,flexShrink:0}}>{(r.note||r.cat||'?').charAt(0)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.note||r.cat}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{r.date}</div>
            </div>
            <div style={{fontSize:14,fontWeight:600,color,fontFamily:'DM Mono,monospace',flexShrink:0}}>{sign}${fmt(r.twd)}</div>
          </div>);
        })}</Card>}
      </div>
    </div>
  );
}

function AddView({records,setRecords,accounts,userId,onDone}){
  const [type,setType]=useState('exp');
  const [date,setDate]=useState(today());
  const [acctId,setAcctId]=useState(accounts[0]?.id||1);
  const [cat,setCat]=useState(CATS.exp[0]);
  const [note,setNote]=useState('');
  const [amount,setAmount]=useState('');
  const [currency,setCurrency]=useState('TWD');
  const [acct2Id,setAcct2Id]=useState(accounts[1]?.id||accounts[0]?.id||1);
  const [done,setDone]=useState(false);
  const [saving,setSaving]=useState(false);
  const [FX,setFX]=useState({TWD:1,USD:32,JPY:0.21,EUR:35,CNY:4.4,HKD:4.1});
  useEffect(()=>{
    fetch('https://open.er-api.com/v6/latest/TWD')
      .then(r=>r.json()).then(d=>{
        if(d.result==='success'&&d.rates){
          const inv=k=>d.rates[k]?+(1/d.rates[k]).toFixed(4):null;
          setFX(f=>({...f,USD:inv('USD')||f.USD,JPY:inv('JPY')||f.JPY,EUR:inv('EUR')||f.EUR,CNY:inv('CNY')||f.CNY,HKD:inv('HKD')||f.HKD}));
        }
      }).catch(()=>{});
  },[]);
  useEffect(()=>{setCat(CATS[type][0]);},[type]);
  const rate=FX[currency]||1;
  const twd=amount&&currency!=='TWD'?Math.round(parseFloat(amount)*rate):null;
  const typeConf={exp:{label:'支出',color:'var(--red)',bg:'var(--red-bg)'},inc:{label:'收入',color:'var(--green)',bg:'var(--green-bg)'},xfr:{label:'轉帳',color:'var(--blue)',bg:'var(--blue-bg)'}};
  async function submit(){
    const a=parseFloat(amount);if(!a||a<=0)return;
    setSaving(true);showSync('儲存中...');
    const rec={id:Date.now(),date,type,acct_id:parseInt(acctId),acct2_id:type==='xfr'?parseInt(acct2Id):null,cat,note:note.trim(),payer:'',amount:a,currency,twd:Math.round(a*rate),user_id:userId};
    const {error}=await sb.from('records').upsert(rec);
    if(error){showSync('儲存失敗','err');}
    else{setRecords([rec,...records]);showSync('已儲存','ok');setNote('');setAmount('');setDone(true);setTimeout(()=>{setDone(false);if(onDone)onDone();},1200);}
    setSaving(false);
  }
  if(done)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'4rem 1rem',gap:12}}><div style={{width:64,height:64,borderRadius:'50%',background:'var(--green-bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>✓</div><div style={{fontSize:18,fontWeight:600,color:'var(--green)'}}>已儲存到雲端！</div></div>);
  const inp={padding:'12px 14px',borderRadius:'var(--rs)',border:'1px solid var(--border2)',background:'var(--surface)',color:'var(--text)',outline:'none',width:'100%',fontSize:15};
  return(
    <Card>
      <div style={{fontSize:16,fontWeight:600,marginBottom:'1rem'}}>新增記錄</div>
      <div style={{display:'flex',gap:6,marginBottom:'1rem'}}>
        {['exp','inc','xfr'].map(t=>(<button key={t} onClick={()=>setType(t)} style={{flex:1,padding:'11px 0',borderRadius:10,border:`1.5px solid ${type===t?typeConf[t].color:'var(--border)'}`,background:type===t?typeConf[t].bg:'transparent',color:type===t?typeConf[t].color:'var(--text2)',fontWeight:type===t?600:400,fontSize:14,cursor:'pointer'}}>{typeConf[t].label}</button>))}
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>金額 {twd&&<span style={{color:'var(--blue)',fontSize:12}}>≈ TWD ${fmt(twd)}</span>}</div>
        <div style={{display:'flex',gap:8}}>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" inputMode="decimal" style={{...inp,fontSize:26,fontWeight:600,fontFamily:'DM Mono,monospace',color:typeConf[type].color,flex:2}}/>
          <select value={currency} onChange={e=>setCurrency(e.target.value)} style={{...inp,flex:1,maxWidth:90}}>{Object.keys(FX).map(c=><option key={c}>{c}</option>)}</select>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:type==='xfr'?8:10}}>
        <div><div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>日期</div><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inp}/></div>
        <div><div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>{type==='xfr'?'轉出帳戶':'帳戶'}</div><select value={acctId} onChange={e=>setAcctId(e.target.value)} style={inp}>{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
      </div>
      {type==='xfr'&&<div style={{marginBottom:10}}><div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>轉入帳戶</div><select value={acct2Id} onChange={e=>setAcct2Id(e.target.value)} style={inp}>{accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>}
      {type!=='xfr'&&<div style={{marginBottom:10}}>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:6}}>分類</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {CATS[type].map(c=>(<button key={c} onClick={()=>setCat(c)} style={{padding:'8px 12px',borderRadius:20,border:`1.5px solid ${cat===c?CC[c]||'var(--text)':'var(--border)'}`,background:cat===c?CB[c]||'var(--surface2)':'transparent',color:cat===c?CC[c]||'var(--text)':'var(--text2)',fontSize:13,fontWeight:cat===c?600:400,cursor:'pointer'}}>{c}</button>))}
        </div>
      </div>}
      <div style={{marginBottom:'1.25rem'}}><div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>備註（選填）</div><input value={note} onChange={e=>setNote(e.target.value)} placeholder="例如：麥當勞午餐" style={inp}/></div>
      <Btn onClick={submit} style={{opacity:saving?0.6:1}}>{saving?'儲存中...':'新增並同步'}</Btn>
    </Card>
  );
}

function RecordsView({records,setRecords,viewMonth}){
  const m=ym(viewMonth);
  const filtered=records.filter(r=>r.date.startsWith(m));
  async function del(id){
    await sb.from('records').delete().eq('id',id);
    setRecords(records.filter(x=>x.id!==id));
    showSync('已刪除','ok');
  }
  function exportCSV(){
    let csv='\uFEFF日期,類型,分類,備註,金額,幣別,TWD\n';
    filtered.forEach(r=>{csv+=`${r.date},${r.type==='exp'?'支出':r.type==='inc'?'收入':'轉帳'},${r.cat||''},${r.note||''},${r.amount},${r.currency||'TWD'},${r.twd}\n`;});
    const url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    const a=document.createElement('a');a.href=url;a.download=`記帳_${m}.csv`;a.click();
  }
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <SLabel style={{margin:0}}>本月明細（{filtered.length} 筆）</SLabel>
        <button onClick={exportCSV} style={{background:'transparent',border:'1px solid var(--border2)',borderRadius:8,padding:'5px 12px',fontSize:12,color:'var(--text2)',cursor:'pointer'}}>匯出 CSV</button>
      </div>
      {!filtered.length?<div style={{textAlign:'center',padding:'3rem',color:'var(--text3)'}}>本月尚無記錄</div>:
        <Card style={{padding:'0 0.75rem'}}>
          {filtered.map((r,i)=>{
            const sign=r.type==='inc'?'+':r.type==='xfr'?'⇄':'-';

function AIView({records,viewMonth,budgets}){
  const [cards,setCards]=useState([]);
  const [ran,setRan]=useState(false);
  const m=ym(viewMonth);
  const mo=records.filter(r=>r.date.startsWith(m));
  const income=mo.filter(r=>r.type==='inc').reduce((s,r)=>s+Number(r.twd),0);
  const expense=mo.filter(r=>r.type==='exp').reduce((s,r)=>s+Number(r.twd),0);
  const saveRate=income>0?Math.round((income-expense)/income*100):null;
  const days=new Date().getDate();
  const projected=days>0?Math.round(expense/days*30):0;
  const catExp={};mo.filter(r=>r.type==='exp').forEach(r=>{catExp[r.cat]=(catExp[r.cat]||0)+Number(r.twd);});

  function analyze(){
    if(!mo.length){setCards([{title:'尚無資料',body:'請先新增本月記錄，系統即可自動分析財務狀況。',type:'info'}]);setRan(true);return;}
    const result=[];

    // 1. 儲蓄率評估
    if(saveRate===null){
      result.push({title:'本月尚無收入記錄',body:`本月已支出 $${fmt(expense)}，建議補登薪水或其他收入，以便計算儲蓄率與結餘。`,type:'info'});
    } else if(saveRate>=30){
      result.push({title:`儲蓄率 ${saveRate}% ─ 優秀`,body:`本月收入 $${fmt(income)}、支出 $${fmt(expense)}，成功儲蓄 $${fmt(income-expense)}。財務健康，繼續保持！`,type:'good'});
    } else if(saveRate>=10){
      result.push({title:`儲蓄率 ${saveRate}% ─ 尚可`,body:`理想目標為 30%，目前尚差約 $${fmt(Math.max(0,Math.round(income*0.3-(income-expense))))}。可嘗試從彈性支出（餐飲、娛樂）著手節省。`,type:'tip'});
    } else {
      result.push({title:`儲蓄率 ${saveRate}% ─ 需注意`,body:`支出已佔收入 ${100-saveRate}%，月底預估支出 $${fmt(projected)}，建議立即找出可削減的項目。`,type:'warn'});
    }

    // 2. 最大支出分類
    const topEntries=Object.entries(catExp).sort((a,b)=>b[1]-a[1]);
    if(topEntries.length>0){
      const [topCat,topVal]=topEntries[0];
      const pct=expense>0?Math.round(topVal/expense*100):0;
      if(pct>50){
        result.push({title:`「${topCat}」支出集中 ${pct}%`,body:`${topCat} 本月 $${fmt(topVal)}，佔總支出過半。若為固定開銷可忽略；若為彈性消費，建議設定上限。`,type:'warn'});
      } else if(pct>30){
        result.push({title:`最大支出：${topCat} $${fmt(topVal)}`,body:`佔本月支出 ${pct}%，屬合理範圍。${topEntries.length>1?`次高為「${topEntries[1][0]}」$${fmt(topEntries[1][1])}（${Math.round(topEntries[1][1]/expense*100)}%）。`:''}`,type:'tip'});
      } else {
        result.push({title:'支出分佈均衡',body:`最高分類「${topCat}」僅佔 ${pct}%，${topEntries.length} 個支出分類分佈平均，消費結構健康。`,type:'good'});
      }
    }

    // 3. 預算超支 / 接近上限警告
    const bds=budgets||{};
    const overBudget=Object.entries(bds).filter(([c,bud])=>bud>0&&(catExp[c]||0)>bud);
    const nearBudget=Object.entries(bds).filter(([c,bud])=>bud>0&&(catExp[c]||0)/bud>=0.7&&(catExp[c]||0)<=bud);
    const hasBudget=Object.values(bds).some(v=>v>0);
    if(overBudget.length>0){
      result.push({title:`${overBudget.length} 個分類超出預算`,body:overBudget.map(([c,bud])=>`${c} 超出 $${fmt((catExp[c]||0)-bud)}（已用 ${Math.round((catExp[c]||0)/bud*100)}%）`).join('；')+'。建議下半月在這些分類謹慎消費。',type:'warn'});
    } else if(nearBudget.length>0){
      result.push({title:'部分預算接近上限',body:nearBudget.map(([c,bud])=>`${c} ${Math.round((catExp[c]||0)/bud*100)}%`).join('、')+'，本月剩餘空間有限，請留意。',type:'tip'});
    } else if(hasBudget){
      result.push({title:'預算控制良好',body:'所有已設定預算的分類目前使用率均低於 70%，財務紀律良好。',type:'good'});
    }

    // 4. 月底超支預警（至少消費 5 天後才預測）
    if(income>0&&days>=5&&projected>income*1.1){
      const remain=30-days;
      const daily=remain>0?Math.round((income-expense)/remain):0;
      result.push({title:'本月可能超支',body:`目前日均消費 $${fmt(Math.round(expense/days))}，月底預估 $${fmt(projected)}（超出收入 $${fmt(projected-income)}）。後續每日建議控制在 $${fmt(Math.max(0,daily))} 以內。`,type:'warn'});
    }

    setCards(result);
    setRan(true);
  }

  useEffect(()=>{setRan(false);},[m]);
  useEffect(()=>{if(!ran)analyze();},[ran]);

  const cm={good:{bg:'#e8f5ee',bc:'#1a7a55',tc:'#0d5c3a'},warn:{bg:'#fdf5e0',bc:'#a06b00',tc:'#7a4f00'},info:{bg:'#eaf1fb',bc:'#1a5fa8',tc:'#0d3f7a'},tip:{bg:'#f0edfc',bc:'#5b3fa8',tc:'#3d2880'}};
  return(<div>
    <div style={{background:'var(--surface2)',borderRadius:12,padding:'12px 14px',marginBottom:10,fontSize:13,color:'var(--text2)'}}>
      {m} · {mo.length} 筆記錄 · 支出 ${fmt(expense)}{income>0?` · 儲蓄率 ${saveRate}%`:''}
    </div>
    {cards.map((c,i)=>{const col=cm[c.type]||cm.tip;return(<div key={i} style={{borderRadius:12,padding:'14px',marginBottom:10,background:col.bg,borderLeft:`3px solid ${col.bc}`}}><div style={{fontSize:13,fontWeight:600,color:col.tc,marginBottom:5}}>{c.title}</div><div style={{fontSize:13,color:col.tc,opacity:.85,lineHeight:1.6}}>{c.body}</div></div>);})}
    <Btn onClick={()=>{setRan(false);}} style={{background:'var(--purple-bg)',color:'var(--purple)',marginTop:4}}>重新分析</Btn>
  </div>);
}

function FixedView({fixedItems,setFixedItems,records,setRecords,accounts,userId}){

        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {CATS[type].map(c=>(<button key={c} onClick={()=>setCat(c)} style={{padding:'7px 11px',borderRadius:20,border:`1.5px solid ${cat===c?CC[c]||'var(--text)':'var(--border)'}`,background:cat===c?CB[c]||'var(--surface2)':'transparent',color:cat===c?CC[c]||'var(--text)':'var(--text2)',fontSize:13,fontWeight:cat===c?600:400,cursor:'pointer'}}>{c}</button>))}

function ShareView({userId}){
  const [items,setItems]=useState([]);
  const [localMembers,setLocalMembers]=useState([]);
  const [newMember,setNewMember]=useState('');
  const [payerName,setPayerName]=useState('');
  const [amount,setAmount]=useState('');
  const [splitParts,setSplitParts]=useState([]);
  const [note,setNote]=useState('');
  const [date,setDate]=useState(today());
  const [saving,setSaving]=useState(false);
  const [loading,setLoading]=useState(true);
  const inp={padding:'10px 12px',borderRadius:'var(--rs)',border:'1px solid var(--border2)',background:'var(--surface)',color:'var(--text)',outline:'none',fontSize:14};

  useEffect(()=>{
    sb.from('share_items').select('*').eq('user_id',userId).order('date',{ascending:false})
      .then(({data})=>{if(data)setItems(data);setLoading(false);});
  },[]);

  // 從所有紀錄推導已知成員（payers 的 key + members 陣列），合併手動新增的
  const knownMembers=useMemo(()=>{
    const s=new Set(localMembers);
    items.forEach(i=>{
      Object.keys(i.payers||{}).forEach(n=>s.add(n));
      (i.members||[]).forEach(n=>s.add(n));
    });
    return [...s].sort();
  },[items,localMembers]);

  function addMember(){
    const nm=newMember.trim();
    if(!nm||knownMembers.includes(nm))return;
    setLocalMembers(m=>[...m,nm]);setNewMember('');
  }
  function toggleSplit(nm){setSplitParts(p=>p.includes(nm)?p.filter(x=>x!==nm):[...p,nm]);}

  async function addItem(){
    if(!payerName||!amount||splitParts.length===0)return;
    const amt=parseFloat(amount);
    setSaving(true);
    const row={id:Date.now(),user_id:userId,date,note:note.trim(),amount:amt,payers:{[payerName]:amt},members:splitParts};
    const {error}=await sb.from('share_items').insert(row);
    if(!error){setItems([row,...items]);setAmount('');setNote('');setSplitParts([]);showSync('已儲存','ok');}
    else showSync('儲存失敗','err');
    setSaving(false);
  }

  async function delItem(id){
    await sb.from('share_items').delete().eq('id',id);
    setItems(items.filter(x=>x.id!==id));
    showSync('已刪除','ok');
  }

  // 計算每人淨餘額：付款方 +，分攤方 −（等比）
  const balances={};
  items.forEach(item=>{
    Object.entries(item.payers||{}).forEach(([n,paid])=>{balances[n]=(balances[n]||0)+Number(paid);});
    const mems=item.members||[];
    if(mems.length>0){
      const share=Number(item.amount)/mems.length;
      mems.forEach(n=>{balances[n]=(balances[n]||0)-share;});
    }
  });

  // 貪心結算：最小化轉帳次數
  const pCopy=Object.entries(balances).filter(([,v])=>v>0.01).sort((a,b)=>b[1]-a[1]).map(([n,v])=>({n,v}));
  const nCopy=Object.entries(balances).filter(([,v])=>v<-0.01).sort((a,b)=>a[1]-b[1]).map(([n,v])=>({n,v}));
  const settlements=[];
  let pi=0,ni=0;
  while(pi<pCopy.length&&ni<nCopy.length){
    const cr=pCopy[pi];const db=nCopy[ni];
    const amt=Math.min(cr.v,-db.v);
    settlements.push({from:db.n,to:cr.n,amount:Math.round(amt)});
    cr.v-=amt;db.v+=amt;
    if(Math.abs(cr.v)<0.01)pi++;if(Math.abs(db.v)<0.01)ni++;
  }

  const total=items.reduce((s,i)=>s+Number(i.amount),0);

  if(loading)return <div style={{textAlign:'center',padding:'3rem',color:'var(--text3)'}}>載入中...</div>;

  return(<div>
    <Card>
      <SLabel>成員</SLabel>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <input value={newMember} onChange={e=>setNewMember(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMember()} placeholder="新增成員名稱" style={{...inp,flex:1,width:'auto'}}/>
        <button onClick={addMember} style={{padding:'10px 16px',borderRadius:'var(--r)',border:'none',background:'var(--text)',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',flexShrink:0}}>新增</button>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {knownMembers.map(m=>(
          <span key={m} style={{background:'var(--surface2)',borderRadius:20,padding:'5px 12px',fontSize:13}}>{m}</span>
        ))}
        {!knownMembers.length&&<span style={{fontSize:13,color:'var(--text3)'}}>尚未有成員，請先新增</span>}
      </div>
    </Card>

    {knownMembers.length>=2&&<Card>
      <SLabel>新增共享支出</SLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
        <div>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>付款人</div>
          <select value={payerName} onChange={e=>setPayerName(e.target.value)} style={{...inp,width:'100%'}}>
            <option value=''>選擇付款人</option>
            {knownMembers.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>金額（TWD）</div>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" style={{...inp,width:'100%'}}/>
        </div>
      </div>
      <div style={{marginBottom:8}}>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>分攤成員（等比）</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {knownMembers.map(m=>(
            <button key={m} onClick={()=>toggleSplit(m)} style={{padding:'7px 12px',borderRadius:20,border:`1.5px solid ${splitParts.includes(m)?'var(--blue)':'var(--border)'}`,background:splitParts.includes(m)?'var(--blue-bg)':'transparent',color:splitParts.includes(m)?'var(--blue)':'var(--text2)',fontSize:13,cursor:'pointer'}}>{m}</button>
          ))}
        </div>
        {splitParts.length>0&&amount&&<div style={{fontSize:12,color:'var(--text3)',marginTop:6}}>每人分攤 ${fmt(parseFloat(amount)/splitParts.length)}</div>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="備註（選填）" style={{...inp,width:'100%'}}/>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,width:'100%'}}/>
      </div>
      <Btn onClick={addItem} style={{opacity:saving?0.6:1}}>{saving?'儲存中...':'新增支出'}</Btn>
    </Card>}

    {settlements.length>0&&<Card style={{background:'var(--green-bg)',border:'1px solid rgba(26,122,85,0.3)'}}>
      <SLabel>結算方式</SLabel>
      {settlements.map((s,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',fontSize:14,borderBottom:i<settlements.length-1?'1px solid rgba(26,122,85,0.15)':'none'}}>
          <span style={{fontWeight:600,color:'var(--red)'}}>{s.from}</span>
          <span style={{color:'var(--text3)'}}>付給</span>
          <span style={{fontWeight:600,color:'var(--green)'}}>{s.to}</span>
          <span style={{marginLeft:'auto',fontWeight:600,fontFamily:'DM Mono,monospace',color:'var(--green)'}}>${fmt(s.amount)}</span>
        </div>
      ))}
    </Card>}

    {items.length>0&&<Card style={{padding:'0 0.75rem'}}>
      <div style={{padding:'0.75rem 0 0.25rem'}}>
        <SLabel style={{margin:0}}>共享支出（{items.length} 筆 · 合計 ${fmt(total)}）</SLabel>
      </div>
      {items.map((item,i)=>{
        const payerStr=Object.entries(item.payers||{}).map(([n,v])=>`${n} $${fmt(v)}`).join('、');
        const membStr=(item.members||[]).join('、');
        return(
          <div key={item.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<items.length-1?'1px solid var(--border)':'none'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.note||'共享支出'}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{payerStr} 付款 · {membStr} 分攤 · {item.date}</div>
            </div>
            <div style={{fontSize:14,fontWeight:600,fontFamily:'DM Mono,monospace',flexShrink:0}}>${fmt(item.amount)}</div>
            <button onClick={()=>delItem(item.id)} style={{background:'none',border:'none',color:'var(--border2)',fontSize:20,padding:'0 0 0 2px',flexShrink:0,cursor:'pointer'}}>×</button>
          </div>
        );
      })}
    </Card>}

    {knownMembers.length<2&&<div style={{textAlign:'center',padding:'3rem',color:'var(--text3)'}}>請先新增至少 2 位成員</div>}
  </div>);
}

function App(){
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [tab,setTab]=useState('home');
  const [moreTab,setMoreTab]=useState('budget');
  const [viewMonth,setViewMonth]=useState(new Date());
  const [records,setRecords]=useState([]);
  const [accounts,setAccounts]=useState([]);
  const [budgets,setBudgets]=useState({});
  const [fixedItems,setFixedItems]=useState([]);
  const [dataLoading,setDataLoading]=useState(false);
  const [desktop,setDesktop]=useState(isDesktop());

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user??null);
      setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user??null);
      setAuthLoading(false);
    });
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!user)return;
    async function loadAll(){
      setDataLoading(true);showSync('從雲端載入資料...');
      const uid=user.id;
      const [r,a,b,fi]=await Promise.all([
        sb.from('records').select('*').eq('user_id',uid).order('date',{ascending:false}),
        sb.from('accounts').select('*').eq('user_id',uid),
        sb.from('budgets').select('*').eq('user_id',uid),
        sb.from('fixed_items').select('*').eq('user_id',uid).order('next_date',{ascending:true}),
      ]);
      if(r.data)setRecords(r.data);
      if(a.data)setAccounts(a.data.length>0?a.data:[{id:Date.now(),name:'現金',type:'現金',init:0,user_id:uid},{id:Date.now()+1,name:'銀行',type:'銀行存款',init:0,user_id:uid}]);
      if(b.data){const bd={};b.data.forEach(x=>{bd[x.cat]=x.amount;});setBudgets(bd);}
      if(fi.data)setFixedItems(fi.data);
      setDataLoading(false);showSync('資料已同步','ok');
    }
    loadAll();
    const h=()=>setDesktop(isDesktop());
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[user]);

  async function signOut(){
    await sb.auth.signOut();
    setUser(null);setRecords([]);setAccounts([]);setBudgets({});
  }

  function changeMonth(d){setViewMonth(new Date(viewMonth.getFullYear(),viewMonth.getMonth()+d,1));}
  const monthLabel=`${viewMonth.getFullYear()}年${viewMonth.getMonth()+1}月`;

  if(authLoading)return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12}}><div style={{fontSize:28}}>💰</div><div style={{fontSize:14,color:'var(--text2)'}}>載入中...</div></div>);
  if(!user)return <LoginPage/>;

  const viewMap={
    home:<HomeView records={records} accounts={accounts} budgets={budgets} viewMonth={viewMonth}/>,
    add:<AddView records={records} setRecords={setRecords} accounts={accounts} userId={user.id} onDone={()=>setTab('home')}/>,
    records:<RecordsView records={records} setRecords={setRecords} viewMonth={viewMonth}/>,
    budget:<BudgetView budgets={budgets} setBudgets={setBudgets} records={records} viewMonth={viewMonth} userId={user.id}/>,
    accounts:<AccountsView accounts={accounts} setAccounts={setAccounts} records={records} userId={user.id}/>,
    fixed:<FixedView fixedItems={fixedItems} setFixedItems={setFixedItems} records={records} setRecords={setRecords} accounts={accounts} userId={user.id}/>,
    share:<ShareView userId={user.id}/>,
    ai:<AIView records={records} viewMonth={viewMonth} budgets={budgets}/>,
  };

  const userAvatar=(
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      {user.user_metadata?.avatar_url&&<img src={user.user_metadata.avatar_url} style={{width:28,height:28,borderRadius:'50%'}}/>}
      <button onClick={signOut} style={{background:'transparent',border:'1px solid var(--border2)',borderRadius:8,padding:'4px 10px',fontSize:12,color:'var(--text2)',cursor:'pointer'}}>登出</button>
    </div>
  );

  if(desktop){
    return(<div style={{display:'grid',gridTemplateColumns:'200px 1fr',minHeight:'100vh',maxWidth:800,margin:'0 auto'}}>
      <div style={{background:'var(--surface)',borderRight:'1px solid var(--border)',padding:'1.5rem 1rem',position:'sticky',top:0,height:'100vh',overflowY:'auto',display:'flex',flexDirection:'column'}}>
        <div style={{fontSize:18,fontWeight:600,padding:'0 0.5rem 1rem',borderBottom:'1px solid var(--border)',marginBottom:'0.5rem'}}>我的帳本</div>
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'0 0.5rem',marginBottom:'1rem'}}>
          <button onClick={()=>changeMonth(-1)} style={{width:24,height:24,borderRadius:'50%',border:'1px solid var(--border2)',background:'transparent',fontSize:14,cursor:'pointer',color:'var(--text2)',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <span style={{fontSize:12,fontWeight:500,flex:1,textAlign:'center'}}>{monthLabel}</span>
          <button onClick={()=>changeMonth(1)} style={{width:24,height:24,borderRadius:'50%',border:'1px solid var(--border2)',background:'transparent',fontSize:14,cursor:'pointer',color:'var(--text2)',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
        </div>
        {ALL_TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'9px 12px',borderRadius:10,border:'none',background:tab===t.id?'var(--surface2)':'transparent',color:tab===t.id?'var(--text)':'var(--text2)',fontWeight:tab===t.id?600:400,fontSize:14,cursor:'pointer',marginBottom:2,textAlign:'left'}}><span style={{fontSize:16}}>{t.icon}</span>{t.label}</button>))}
        <div style={{marginTop:'auto',paddingTop:'1rem',borderTop:'1px solid var(--border)'}}>{userAvatar}</div>
      </div>
      <div style={{padding:'1.5rem',overflowY:'auto'}}>{dataLoading?<div style={{textAlign:'center',padding:'3rem',color:'var(--text3)'}}>載入中...</div>:viewMap[tab]||viewMap.home}</div>
    </div>);
  }

  return(<div>
    {tab!=='add'&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1rem 1rem 0.5rem'}}>
      <div style={{fontSize:20,fontWeight:600,letterSpacing:'-0.5px'}}>我的帳本</div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>changeMonth(-1)} style={{width:30,height:30,borderRadius:'50%',border:'1px solid var(--border2)',background:'transparent',fontSize:16,color:'var(--text2)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>‹</button>
          <span style={{fontSize:12,fontWeight:500,minWidth:72,textAlign:'center'}}>{monthLabel}</span>
          <button onClick={()=>changeMonth(1)} style={{width:30,height:30,borderRadius:'50%',border:'1px solid var(--border2)',background:'transparent',fontSize:16,color:'var(--text2)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>›</button>
        </div>
        {user.user_metadata?.avatar_url&&<img src={user.user_metadata.avatar_url} onClick={signOut} style={{width:28,height:28,borderRadius:'50%',cursor:'pointer'}} title="點擊登出"/>}
      </div>
    </div>}
    <div style={{padding:'0 1rem'}}>
      {tab==='more'?(<>
        <div style={{display:'flex',gap:2,background:'var(--surface2)',borderRadius:12,padding:3,marginBottom:12,overflowX:'auto'}}>
          {MORE_TABS.map(t=>(<button key={t.id} onClick={()=>setMoreTab(t.id)} style={{flex:'0 0 auto',padding:'7px 13px',borderRadius:9,border:'none',background:moreTab===t.id?'var(--surface)':'transparent',color:moreTab===t.id?'var(--text)':'var(--text2)',fontWeight:moreTab===t.id?600:400,fontSize:13,cursor:'pointer'}}>{t.label}</button>))}
        </div>
        {viewMap[moreTab]||viewMap.budget}
      </>):viewMap[tab]||viewMap.home}
    </div>
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:'var(--surface)',borderTop:'1px solid var(--border)',display:'flex',zIndex:100,paddingBottom:'env(safe-area-inset-bottom)'}}>
      {MOBILE_NAV.map(n=>(<button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:'10px 0 8px',border:'none',background:'transparent',display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:tab===n.id?'var(--text)':'var(--text3)',cursor:'pointer'}}>
        <span style={{fontSize:n.id==='add'?22:18,fontWeight:600,lineHeight:1}}>{n.icon}</span>
        <span style={{fontSize:10,fontWeight:tab===n.id?600:400}}>{n.label}</span>
      </button>))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
